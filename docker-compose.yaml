services:

  chroma:
    image: chromadb/chroma:latest
    environment:
      CHROMA_SERVER_AUTH_CREDENTIALS: ${CHROMA_TOKEN}
      CHROMA_SERVER_AUTH_PROVIDER: chromadb.auth.token.TokenAuthServerProvider
    volumes:
      - chroma_data:/chroma/chroma

  agent:
    build:
      context: .
      dockerfile: Dockerfile

    # DEV - Debugging TTY
    # stdin_open: true
    # tty: true

    command: ["chainlit", "run", "app/main.py", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      CHROMA_TOKEN: ${CHROMA_TOKEN}
      OLLAMA_HOST: http://host.docker.internal:11434
    depends_on:
      chroma:
        condition: service_started
    restart: unless-stopped


  ingest:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "python app/ingest.py && sleep infinity"

    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.ingest-job.schedule: "@daily"
      ofelia.job-exec.ingest-job.command: "python app/ingest.py"

    # DEV - Debugging TTY
    # stdin_open: true
    # tty: true

    env_file: .env
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      CHROMA_TOKEN: ${CHROMA_TOKEN}
      OLLAMA_HOST: http://host.docker.internal:11434
    depends_on:
      chroma:
        condition: service_started
    restart: unless-stopped

  ofelia:
    image: mcuadros/ofelia:latest
    container_name: ingest-cron
    depends_on:
      - ingest
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

volumes:
  chroma_data: